{% extends "layout.html" %}

{% block container %}

<div class="max-w-7xl mx-auto py-10 px-4">

    <div class="relative overflow-x-auto shadow-md sm:rounded-lg border border-gray-200 bg-white">
        <table class="w-full text-sm text-left text-gray-500">

            <thead class="text-xs text-white uppercase bg-gray-800 border-b border-gray-900">
                <tr>
                    <th scope="col" class="px-6 py-4 font-semibold tracking-wider">Nombre</th>
                    <th scope="col" class="px-6 py-4 font-semibold tracking-wider">Apellidos</th>
                    <th scope="col" class="px-6 py-4 font-semibold tracking-wider">Correo</th>
                    <th scope="col" class="px-6 py-4 font-semibold tracking-wider">Teléfono</th>
                    <th scope="col" class="px-6 py-4 font-semibold tracking-wider text-center">Cursos</th>
                </tr>
            </thead>

            <tbody>
                {%for alum in alumno%}
                <tr class="bg-white border-b hover:bg-gray-50 transition-colors">
                    <th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">
                        {{ alum.nombre }}
                    </th>
                    <td class="px-6 py-4">{{ alum.apellidos }}</td>
                    <td class="px-6 py-4">{{ alum.email }}</td>
                    <td class="px-6 py-4">{{ alum.telefono }}</td>

                    <td class="px-6 py-4 text-center">
                        <a href="/alumnos/cursos?id={{ alum.id }}"
                            class="inline-flex items-center justify-center gap-1.5 bg-orange-500 text-white px-3 py-2 rounded-lg hover:bg-orange-600 transition-colors shadow-sm text-xs font-medium">
                            <svg class="w-4 h-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                                viewBox="0 0 24 24">
                                <path stroke="currentColor" stroke-linecap="square" stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M7 19H5a1 1 0 0 1-1-1v-1a3 3 0 0 1 3-3h1m4-6a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm7.441 1.559a1.907 1.907 0 0 1 0 2.698l-6.069 6.069L10 19l.674-3.372 6.07-6.07a1.907 1.907 0 0 1 2.697 0Z" />
                            </svg>
                            Ver Cursos Inscritos
                        </a>
                    </td>
                </tr>
                {%endfor%}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
