{% extends "layout.html" %}
{% block container %}

<div class="max-w-md mx-auto mt-10 bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">

    <div class="flex flex-col items-center px-6 pt-8 pb-6 text-center">
        <div
            class="w-20 h-20 mb-4 rounded-full bg-blue-600 flex items-center justify-center text-white text-3xl font-bold shadow-md border-4 border-blue-50">
            {{ curso.nombre[:1] | upper }}
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-1">{{ curso.nombre }}</h2>
        <span class="text-sm font-medium text-blue-600 bg-blue-50 px-2.5 py-0.5 rounded border border-blue-200 mb-4">ID:
            {{ curso.id }}</span>

        <p class="text-sm text-gray-600 w-full">{{ curso.descripcion }}</p>
    </div>

    <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex items-center gap-3">
        <div class="bg-gray-200 p-2 rounded-full">
            <svg class="w-5 h-5 text-gray-600" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor"
                viewBox="0 0 24 24">
                <path fill-rule="evenodd"
                    d="M12 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm-2 9a4 4 0 0 0-4 4v1a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-1a4 4 0 0 0-4-4h-4Z"
                    clip-rule="evenodd" />
            </svg>
        </div>
        <div class="text-left">
            <p class="text-xs font-bold text-gray-500 uppercase">Profesor Asignado</p>
            <p class="text-sm font-semibold text-gray-900">{{ curso.maestro.nombre }} {{ curso.maestro.apellidos }}</p>
        </div>
    </div>

    <!--div class="px-6 py-5 bg-white border-t border-gray-100">
        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">
            Alumnos Inscritos ({{ curso.alumnos|length }})
        </h3>

        <ul class="divide-y divide-gray-100">
            {% for alumno in curso.alumnos %}
            <li class="py-2.5 flex items-center gap-3">
                <div
                    class="w-8 h-8 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-xs font-bold shadow-sm">
                    {{ alumno.nombre[:1] }}
                </div>
                <span class="text-sm font-medium text-gray-700">{{ alumno.nombre }} {{ alumno.apellidos }}</span>
            </li>
            {% else %}
            <li class="py-3 text-sm text-gray-400 italic text-center bg-gray-50 rounded-lg">
                No hay alumnos inscritos en este curso aún.
            </li>
            {% endfor %}
        </ul>
    </div-->

    <div class="flex justify-center gap-3 px-6 py-4 bg-gray-50 border-t border-gray-200">
        <a href="/cursos"
            class="w-full text-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 focus:ring-4 focus:ring-gray-100 transition-colors">
            Regresar a la Lista
        </a>
    </div>

</div>

{% endblock %}
