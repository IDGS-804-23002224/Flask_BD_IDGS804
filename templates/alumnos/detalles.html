{% extends "layout.html" %}
{% block container %}

<div class="max-w-md mx-auto mt-10 bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 relative">

    <div class="absolute top-4 right-4">
        <button id="dropdownButton" data-dropdown-toggle="dropdown"
            class="text-gray-500 hover:bg-gray-100 focus:ring-4 focus:outline-none focus:ring-gray-200 rounded-lg text-sm p-1.5 transition-colors"
            type="button">
            <span class="sr-only">Abrir menú</span>
            <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-width="3" d="M6 12h.01m6 0h.01m5.99 0h.01" />
            </svg>
        </button>
        <div id="dropdown"
            class="z-10 hidden text-base list-none bg-white divide-y divide-gray-100 rounded-lg shadow-lg w-44 border border-gray-100">
            <ul class="py-2 text-sm text-gray-700" aria-labelledby="dropdownButton">
                <li><a href="#" class="block px-4 py-2 hover:bg-gray-50">Editar</a></li>
                <li><a href="#" class="block px-4 py-2 hover:bg-gray-50">Exportar Datos</a></li>
                <li><a href="#" class="block px-4 py-2 text-red-600 hover:bg-red-50">Eliminar</a></li>
            </ul>
        </div>
    </div>

    <div class="flex flex-col items-center px-6 pt-8 pb-6">
        <img class="w-24 h-24 mb-4 rounded-full shadow-sm border-4 border-gray-50" src="/static/src/img/user.jpg"
            alt="Foto de perfil" />
        <h2 class="text-2xl font-bold text-gray-900 mb-1">{{ alumno.nombre }} {{ alumno.apellidos }}</h2>

        <div class="flex flex-col items-center mt-3 gap-2 text-sm text-gray-600">
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 7h16M4 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2M4 7v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7m-8 6h.01" />
                </svg>
                <span>{{ alumno.email }}</span>
            </div>
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M18.427 14.768 17.2 13.542a1.733 1.733 0 0 0-2.45 0l-.613.613a1.732 1.732 0 0 1-2.45 0l-1.838-1.84a1.735 1.735 0 0 1 0-2.452l.612-.613a1.735 1.735 0 0 0 0-2.452L9.237 5.572a1.6 1.6 0 0 0-2.45 0c-3.223 3.2-1.453 9.909 4.152 15.515 5.606 5.606 12.314 7.375 15.515 4.152a1.6 1.6 0 0 0 0-2.452Z" />
                </svg>
                <span>{{ alumno.telefono }}</span>
            </div>
        </div>
    </div>

                    viewBox="0 0 24 24">

        </div>
    </div-->

    <div class="flex justify-center gap-3 px-6 py-4 bg-white">
        <a href="/alumnos"
            class="w-full text-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:ring-4 focus:ring-gray-100 transition-colors">
            Regresar
        </a>
        <a href="/alumnos/modificar?id={{ alumno.id }}"
            class="w-full text-center px-4 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 transition-colors">
            Modificar Perfil
        </a>
    </div>
